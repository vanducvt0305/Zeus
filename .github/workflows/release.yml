# Build and publish the MCP server image to GitHub Container Registry on a
# version tag (e.g. `git tag v0.1.0 && git push --tags`). Runs on a clean
# network, so it builds the standard (non-vendored) Dockerfile. After it
# publishes ghcr.io/<owner>/zeus, publish server.json to the MCP registry with
# `mcp-publisher` (see README → Publishing & listing).
name: release

on:
  push:
    tags: ["v*"]

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zeus
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
