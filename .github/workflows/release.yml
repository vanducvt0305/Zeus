# Build and publish the MCP server image to GitHub Container Registry. Triggers
# on a version tag (`git tag v0.1.0 && git push --tags`) or a manual dispatch
# (Actions tab → Run workflow, or the API) with a version input. Runs on a clean
# network, so it builds the standard (non-vendored) Dockerfile. After it
# publishes ghcr.io/<owner>/zeus, publish server.json to the MCP registry with
# `mcp-publisher` (see README → Publishing & listing).
name: release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Image version tag (e.g. 0.1.0)"
        default: "0.1.0"

jobs:
  image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/zeus
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=${{ github.event.inputs.version }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

